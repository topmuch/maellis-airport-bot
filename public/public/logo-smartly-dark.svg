    <path d="M12 14C12 11.79 13.79 10 16 10H28C30.21 10 32 11.79 32 14V24C32 26.21 30.21 28 28 28H24L22 33L20 28H16C13.79 28 12 26.21 12 24V14Z" fill="white" opacity="0.95"/>
