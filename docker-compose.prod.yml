version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/custom.db
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:?NEXTAUTH_SECRET must be set}
      - AUTH_SECRET=${AUTH_SECRET:?AUTH_SECRET must be set}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - CINETPAY_API_KEY=${CINETPAY_API_KEY}
      - CINETPAY_SITE_ID=${CINETPAY_SITE_ID}
      - CINETPAY_WEBHOOK_SECRET=${CINETPAY_WEBHOOK_SECRET}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - WHATSAPP_TOKEN=${WHATSAPP_TOKEN}
      - WHATSAPP_VERIFY_TOKEN=${WHATSAPP_VERIFY_TOKEN}
      - AVIATION_API_KEY=${AVIATION_API_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
    volumes:
      - app-data:/app/data
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      app:
        condition: service_healthy
    restart: always

volumes:
  app-data:
  caddy-data:
  caddy-config:
